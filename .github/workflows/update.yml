name: Daily AI repo refresh (cloud)

# 매일 22:00 UTC(=07:00 KST) 클라우드 전체 파이프라인 — 맥 무관.
# 수집 → 분류 → 신규요약(OpenRouter) → 트렌드 → 커밋 → Cloudflare Pages 배포
#
# 필요한 Secrets (repo Settings → Secrets and variables → Actions):
#   OPENROUTER_API_KEY     — OpenRouter 무료 API 키
#   CLOUDFLARE_API_TOKEN   — CF Pages:Edit 권한 토큰
#   CLOUDFLARE_ACCOUNT_ID  — CF 계정 ID
# 필요한 Variables:
#   OPENROUTER_MODEL       — 무료 모델 ID (openrouter.ai/models, Price=Free 에서 선택)

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 1) Fetch + classify (요약 보존 merge)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd scripts && python3 fetch_repos.py

      - name: 2) Summarize new repos (OpenRouter, 일일 캡 150)
        env:
          LLM_BACKEND: openrouter
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
        run: cd scripts && python3 summarize.py 150

      - name: 3) Trends (OpenRouter)
        env:
          LLM_BACKEND: openrouter
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
        run: cd scripts && python3 trends.py

      - name: 4) Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/repos.json public/data/trends.json
          git diff --staged --quiet || git commit -m "chore: daily cloud refresh"
          git push

      - name: 5) Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy public --project-name ai-repo-radar --branch main --commit-dirty=true
