<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Repo Radar — 매일 뜨는 AI 오픈소스, 실전점수로 큐레이션</title>
  <meta name="description" content="GitHub에 매일 올라오는 AI 오픈소스를 카테고리별로 분류하고 실전투입 점수를 매겨 큐레이션합니다. 한국어/영어 지원." />
  <link rel="canonical" href="https://ai-repo-radar-1u7.pages.dev/" />

  <!-- Open Graph (카카오톡·페이스북·링크드인 미리보기) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://ai-repo-radar-1u7.pages.dev/" />
  <meta property="og:title" content="AI Repo Radar — 매일 뜨는 AI 오픈소스 큐레이션" />
  <meta property="og:description" content="매일 GitHub에 올라오는 AI 오픈소스를 분류·실전점수·트렌드로 정리. 4,200+ repos · 20 카테고리 · 한/영." />
  <meta property="og:image" content="https://ai-repo-radar-1u7.pages.dev/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="AI Repo Radar" />
  <meta property="og:locale" content="ko_KR" />

  <!-- Twitter / X 카드 -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="AI Repo Radar — 매일 뜨는 AI 오픈소스 큐레이션" />
  <meta name="twitter:description" content="매일 GitHub AI 오픈소스를 분류·실전점수·트렌드로. 4,200+ repos · 한/영." />
  <meta name="twitter:image" content="https://ai-repo-radar-1u7.pages.dev/og.png" />

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- 화면 고정 버튼 (스크롤 무관) -->
  <div class="fixed-tl">
    <a id="support-kofi" class="support" href="https://ko-fi.com/seongbeomjeon" target="_blank" rel="noopener">☕ <span id="kofi-label">Ko-fi 후원</span></a>
    <a id="support-kakao" class="support" href="https://qr.kakaopay.com/FGKOsdpub" target="_blank" rel="noopener">💛 <span id="kakao-label">카카오페이 후원</span></a>
    <button id="fb-open" class="support" type="button">💬 <span id="fb-open-label">피드백</span></button>
  </div>
  <div class="fixed-tr">
    <button id="theme-toggle" class="icon-toggle" aria-label="theme">🌙</button>
    <button id="lang-toggle" class="lang-toggle" aria-label="language"></button>
  </div>

  <header class="hero">
    <div class="wrap">
      <h1>AI Repo <span class="accent">Radar</span></h1>
      <p class="tagline" id="tagline"></p>
      <div class="meta" id="meta">…</div>
    </div>
  </header>

  <nav class="controls">
    <div class="inner">
      <input id="search" type="search" placeholder="검색 — 이름 · 설명 · 태그" autocomplete="off" />
      <div class="tabs" id="tabs"></div>
      <div class="sortrow">
        <label><span id="sort-label">정렬</span>
          <select id="sort">
            <option value="prod_score"></option>
            <option value="star_velocity"></option>
            <option value="stars"></option>
            <option value="created_at"></option>
            <option value="last_push"></option>
          </select>
        </label>
        <label class="minscore"><span id="minscore-label">최소점수</span> <output id="minOut">0</output>
          <input id="minScore" type="range" min="0" max="100" step="10" value="0" />
        </label>
      </div>
    </div>
  </nav>

  <main class="wrap">
    <section id="trend" class="trend" hidden>
      <div class="trend-head">
        <span class="trend-eyebrow" id="trend-eyebrow">📡 지금 어디로 가고 있나</span>
        <span class="trend-count" id="trend-count"></span>
      </div>
      <p class="trend-summary" id="trend-summary"></p>
      <div class="trend-keywords" id="trend-keywords"></div>
    </section>
    <div id="grid" class="grid"></div>
    <p id="cap-note" class="cap-note" hidden></p>
    <div id="empty" class="empty" hidden>조건에 맞는 repo가 없다 🤷</div>
  </main>

  <footer class="wrap">
    <p id="footer-data"></p>
  </footer>

  <!-- 상세 시트 -->
  <div id="sheet" class="sheet" hidden>
    <div class="sheet-backdrop" data-close></div>
    <div class="sheet-card" role="dialog" aria-modal="true">
      <button class="sheet-close" data-close aria-label="닫기">✕</button>
      <div id="sheet-body"></div>
    </div>
  </div>

  <!-- 피드백 모달 -->
  <div id="fb" class="fb" hidden>
    <div class="fb-backdrop" data-fbclose></div>
    <div class="fb-card" role="dialog" aria-modal="true">
      <button class="fb-close" data-fbclose aria-label="close">✕</button>
      <h2 id="fb-title"></h2>
      <p id="fb-sub"></p>
      <textarea id="fb-msg" rows="5"></textarea>
      <input id="fb-contact" type="text" autocomplete="off" />
      <input id="fb-bot" type="checkbox" tabindex="-1" autocomplete="off" style="position:absolute;left:-9999px" aria-hidden="true" />
      <button id="fb-send" class="btn btn-1" type="button"></button>
      <div id="fb-status" class="fb-status"></div>
    </div>
  </div>

  <script src="./app.js"></script>
  <!-- Cloudflare Web Analytics -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "586d5cd0250c468eb51f71072866e8fc"}'></script>
  <!-- End Cloudflare Web Analytics -->
</body>
</html>
